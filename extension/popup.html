<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FocusLens</title>
  <style>
    :root {
      --bg-color: #0d1117;
      --card-bg: #161b22;
      --text-color: #c9d1d9;
      --accent-color: #58a6ff;
      --success-color: #2ea44f;
      --border-color: #30363d;
      --font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    }

    body {
      font-family: var(--font-family);
      background-color: var(--bg-color);
      color: var(--text-color);
      margin: 0;
      padding: 16px;
      width: 200px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .container {
      width: 100%;
      text-align: center;
    }

    h1 {
      font-size: 16px;
      margin: 0 0 12px 0;
      color: var(--accent-color);
      letter-spacing: 0.5px;
    }

    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      background-color: rgba(46, 164, 79, 0.15);
      color: #3fb950;
      padding: 4px 10px;
      border-radius: 12px;
      border: 1px solid rgba(46, 164, 79, 0.3);
      font-weight: 600;
      margin-bottom: 16px;
    }

    .status-dot {
      width: 6px;
      height: 6px;
      background-color: #3fb950;
      border-radius: 50%;
      display: inline-block;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0% { transform: scale(0.95); opacity: 0.5; }
      50% { transform: scale(1.1); opacity: 1; }
      100% { transform: scale(0.95); opacity: 0.5; }
    }

    .stats-card {
      background-color: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      padding: 12px;
      width: 100%;
      box-sizing: border-box;
    }

    .stats-label {
      font-size: 11px;
      color: #8b949e;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 4px;
    }

    .stats-val {
      font-size: 24px;
      font-weight: bold;
      color: #ffffff;
      margin: 0;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>FocusLens</h1>
    <div class="status-badge">
      <span class="status-dot"></span>
      Active
    </div>
    <div class="stats-card">
      <div class="stats-label">Tracked Sessions</div>
      <div class="stats-val" id="session-count">0</div>
    </div>
  </div>
  <script type="module" src="popup.js"></script>
</body>
</html>
